<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exercicio 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container d-flex justify-content-center">
        <form class="w-50">
            <h4 class="mb-3">Billing Adress</h4>
            <div class="row g-2">
                <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control">
                </div>
            </div>
            <div class="col-md-12">
                <label class="form_label">Username</label>
                <div class="input-group">
                    <span class="input-group-text">@</span>
                    <input type="text" class="form-control" placeholder="Username">
                </div>
            </div>
            <div class="col-md-12">
                <label class="form-label">Email (Optional)</label>
                <input type="text" class="form-control" placeholder="you@example.com">
            </div>
            <div class="col-md-12">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" placeholder="1234 Main St">
            </div>
            <div class="col-md-12">
                <label class="form-label">Address 2 (Optional)</label>
                <input type="text" class="form-control" placeholder="Apartment or suit">
            </div>
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label">Country</label>
                    <select class="form-select">
                        <option selected>Choose...</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">State</label>
                    <select class="form-select">
                        <option selected>Choose...</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Zip</label>
                    <input type="text" class="form-control">
                </div>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
