<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container py-4">
      <h1>Formulario 3</h1>
      <div class="row g-3 align-items-center">
        <div class="col-md-3">
          <label for="inputPassword6" class="col-form-label fw-bold">Partner name</label>
        </div>
        <div class="col-md-3">
          <input type="tex" class="form-control">
        </div>
        <div class="col-md-3">
          <label for="inputPassword6" class="col-form-label fw-bold">Partner email ID</label>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control">
        </div>
        
        <div class="col-md-3">
          <label for="inputPassword6" class="col-form-label fw-bold">Partner legal name</label>
        </div>
        <div class="col-md-3">
          <input type="tex" class="form-control">
        </div>
        <div class="col-md-3">
          <label for="inputPassword6" class="col-form-label fw-bold">Partner mobile</label>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control">
        </div>

        <div class="col-md-3">
          <label for="inputPassword6" class="col-form-label fw-bold">Partner adress</label>
        </div>
        <div class="col-md-9">
          <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
        </div>

        <div class="col-md-3">
          <label for="inputPassword6" class="col-form-label fw-bold">Contract Start Date</label>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control" placeholder="Date Start">
        </div>
        <div class="col-md-3">
          <label for="inputPassword6" class="col-form-label fw-bold">Contract Expiry Date</label>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control" placeholder="Date End">
        </div>

        <div class="col-md-3">
          <label for="inputPassword6" class="col-form-label fw-bold">Minimum Loan Amount</label>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control">
        </div>
        <div class="col-md-3">
          <label for="inputPassword6" class="col-form-label fw-bold">Maximum Loan Amount</label>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control">
        </div>

        <div class="col-md-3">
          <label for="inputPassword6" class="col-form-label fw-bold">Interest Rate</label>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control">
        </div>
        <div class="col-md-3">
          <label for="inputPassword6" class="col-form-label fw-bold">Deposit Amount</label>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control">
        </div>
        <div class="d-md-flex d-md-flex justify-content-center">
          <button class="btn btn-primary btn-sm" type="submit">Save</button>
        </div>
        
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</html>
