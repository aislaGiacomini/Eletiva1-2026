<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formulário 1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4"> <!-- Faz margem-->
  <h1>Formulário 1</h1>
  <form class="row g-3 needs-validation" novalidate method="post">
    
    <div class="col-md-4">
      <label for="firstName" class="form-label">First name</label>
      <input type="text" class="form-control" id="firstName" name="firstName" value="Mark" required>
      <div class="invalid-feedback">Informe seu primeiro nome.</div>
    </div>

    <div class="col-md-4">
      <label for="lastName" class="form-label">Last name</label>
      <input type="text" class="form-control" id="lastName" name="lastName" value="Otto" required>
      <div class="invalid-feedback">Informe seu sobrenome.</div>
    </div>

    <div class="col-md-4">
      <label for="username" class="form-label">Username</label>
      <div class="input-group has-validation">
        <span class="input-group-text">@</span>
        <input type="text" class="form-control" id="username" name="username" required>
        <div class="invalid-feedback">Escolha um nome de usuário.</div>
      </div>
    </div>

    <div class="col-md-6">
      <label for="city" class="form-label">City</label>
      <input type="text" class="form-control" id="city" name="city" placeholder="City" required>
      <div class="invalid-feedback">Informe sua cidade.</div>
    </div>

    <div class="col-md-3">
      <label for="state" class="form-label">State</label>
      <input type="text" class="form-control" id="state" name="state" placeholder="State" required>
      <div class="invalid-feedback">Informe seu estado.</div>
    </div>

    <div class="col-md-3">
      <label for="zip" class="form-label">Zip</label>
      <input type="text" class="form-control" id="zip" name="zip" placeholder="Zip" required>
      <div class="invalid-feedback">Informe seu CEP.</div>
    </div>

    <div class="col-12">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="terms" required>
        <label class="form-check-label" for="terms">
          Agree to terms and conditions
        </label>
        <div class="invalid-feedback">Você deve concordar antes de enviar.</div>
      </div>
    </div>

    <div class="col-12">
      <button class="btn btn-primary" type="submit">Submit form</button>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Script para validação Bootstrap
(() => {
  'use strict'
  const forms = document.querySelectorAll('.needs-validation')
  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault()
        event.stopPropagation()
      }
      form.classList.add('was-validated')
    }, false)
  })
})()
</script>
</body>
</html>
